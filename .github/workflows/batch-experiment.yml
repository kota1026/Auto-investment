name: Weekly Batch Experiment (Monte Carlo)

# Runs N independent contests with different seeds to get statistical
# significance on Claude's edge over the heuristic. Single contest runs
# are noisy — N=10 gives you a confidence interval.
#
# Schedule: every Monday at 07:00 UTC.
# Manual:   Actions tab → "Weekly Batch Experiment" → "Run workflow"
#
# COST (per batch run with default N=10):
#   Heuristic-only: free
#   Claude phase:   ~$25-30 (10 × 30-day contests × 180 decisions × $0.014)
#
# To control cost, lower N_SEEDS or DAYS in the workflow inputs.

on:
  workflow_dispatch:
    inputs:
      n_seeds:
        description: "Number of independent runs (statistical N)"
        required: true
        default: "10"
        type: string
      capital:
        description: "Starting capital in USD"
        required: true
        default: "30"
        type: string
      days:
        description: "Contest duration in days"
        required: true
        default: "7"
        type: string
      use_ai:
        description: "Run Claude phase (false = heuristic only, free)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Weekly auto-run — heuristic only (free) by default. Edit to enable Claude.
  schedule:
    - cron: "0 7 * * 1"  # Monday 07:00 UTC

permissions:
  contents: write
  issues: write

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch experiment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_N_SEEDS: ${{ github.event.inputs.n_seeds || '10' }}
          BATCH_CAPITAL: ${{ github.event.inputs.capital || '30' }}
          BATCH_DAYS: ${{ github.event.inputs.days || '7' }}
          BATCH_INTERVAL: "4"
          BATCH_REAL_DATA: "false"
          BATCH_USE_AI: ${{ github.event.inputs.use_ai || 'false' }}
        run: |
          PYTHONPATH=src python scripts/batch_experiment.py

      - name: Commit batch result to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ || true
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            git commit -m "Auto: batch experiment $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload batch results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results-${{ github.run_id }}
          path: results/
          retention-days: 90
